training:
  target: "FTR"
  test_season: "2023-2024"
  cv_splits: 5
  random_seed: 42
  feature_version: "v1"
models:
  logistic_regression:
    C: 0.1
    max_iter: 1000
    class_weight: "balanced"
    solver: "lbfgs"
    multi_class: "multinomial"
  xgboost:
    n_estimators: 500
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.7
    eval_metric: "mlogloss"
    early_stopping_rounds: 50
  lightgbm:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    num_leaves: 63
    subsample: 0.8
    colsample_bytree: 0.7
    metric: "multi_logloss"
  meta_learner:
    type: "logistic_regression"
    C: 0.05
    max_iter: 1000
optuna:
  n_trials: 100
  direction: "minimize"
  pruner: "MedianPruner"
  storage: "sqlite:///models/optuna.db"
